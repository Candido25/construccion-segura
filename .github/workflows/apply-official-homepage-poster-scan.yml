name: Apply official homepage poster by source scan

on:
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  scan-build-validate-merge:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/nueva-portada-afiche-v2
          fetch-depth: 0

      - name: Set up tools
        run: |
          python -m pip install --quiet pillow
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg

      - name: Materialize historical branch
        run: |
          git fetch origin portada-profesional-v6:refs/remotes/origin/portada-profesional-v6
          rm -rf /tmp/historical-portada
          git worktree add --detach /tmp/historical-portada origin/portada-profesional-v6

      - name: Scan and recover the best poster source
        run: |
          python <<'PY'
          from pathlib import Path
          from PIL import Image
          import base64
          import io
          import re
          import subprocess
          import hashlib

          root = Path('/tmp/historical-portada')
          temp = Path('/tmp/poster-scan')
          temp.mkdir(exist_ok=True)
          keywords = ('portada', 'poster', 'hero', 'brand', 'marca', 'fuente', 'site-global')
          candidates = []
          seen = set()

          def add_bytes(label, data, bonus=0):
              digest = hashlib.sha256(data).hexdigest()
              if digest in seen or len(data) < 20_000 or len(data) > 12_000_000:
                  return
              seen.add(digest)
              candidates.append((label, data, bonus))

          for path in root.rglob('*'):
              if not path.is_file() or '.git' in path.parts:
                  continue
              lower = str(path.relative_to(root)).lower()
              if not any(word in lower for word in keywords):
                  continue
              try:
                  data = path.read_bytes()
              except OSError:
                  continue
              bonus = 100 if 'portada' in lower or 'poster' in lower else 30
              add_bytes(lower, data, bonus)

              try:
                  text = data.decode('utf-8', errors='ignore')
              except Exception:
                  text = ''
              if text:
                  for index, match in enumerate(re.finditer(r'(?:data:image/[^;]+;base64,)?([A-Za-z0-9+/=]{20000,})', text)):
                      encoded = match.group(1)
                      try:
                          decoded = base64.b64decode(encoded, validate=False)
                          add_bytes(f'{lower} base64-{index}', decoded, bonus + 60)
                      except Exception:
                          pass
                  compact = b''.join(data.split())
                  try:
                      decoded = base64.b64decode(compact, validate=True)
                      add_bytes(f'{lower} whole-base64', decoded, bonus + 40)
                  except Exception:
                      pass

          def byte_variants(data):
              yield data
              if len(data) >= 12 and data[:4] == b'RIFF' and data[8:12] != b'WEBP':
                  patched = bytearray(data)
                  patched[8:12] = b'WEBP'
                  yield bytes(patched)

          recovered = []
          for item_index, (label, data, bonus) in enumerate(candidates):
              for variant_index, variant in enumerate(byte_variants(data)):
                  image = None
                  method = None
                  try:
                      image = Image.open(io.BytesIO(variant)).convert('RGB')
                      image.load()
                      method = 'Pillow'
                  except Exception:
                      source_file = temp / f'candidate-{item_index}-{variant_index}.bin'
                      output_file = temp / f'candidate-{item_index}-{variant_index}.png'
                      source_file.write_bytes(variant)
                      result = subprocess.run(
                          ['ffmpeg', '-hide_banner', '-loglevel', 'error', '-y', '-i', str(source_file), '-frames:v', '1', str(output_file)],
                          capture_output=True,
                          text=True,
                      )
                      if result.returncode == 0 and output_file.exists():
                          try:
                              image = Image.open(output_file).convert('RGB')
                              image.load()
                              method = 'FFmpeg'
                          except Exception:
                              image = None
                  if image is None or image.width < 700 or image.height < 700:
                      continue
                  ratio = image.width / image.height
                  square_score = max(0, 500 - abs(1 - ratio) * 1000)
                  resolution_score = min(image.width, image.height)
                  score = bonus + square_score + resolution_score
                  recovered.append((score, label, method, image.copy()))

          if not recovered:
              raise SystemExit('No se encontró ninguna fuente de portada decodificable.')

          recovered.sort(key=lambda item: item[0], reverse=True)
          for score, label, method, image in recovered[:8]:
              print(f'Candidato: score={score:.1f} size={image.size} method={method} source={label}')

          score, label, method, source = recovered[0]
          if score < 1000:
              raise SystemExit(f'La mejor fuente no alcanza la puntuación mínima: {score} {label}')
          print('Fuente seleccionada:', label, method, source.size, score)

          def fit_canvas(image, size):
              width, height = size
              scale = min(width / image.width, height / image.height)
              resized = image.resize(
                  (round(image.width * scale), round(image.height * scale)),
                  Image.Resampling.LANCZOS,
              )
              canvas = Image.new('RGB', size, (255, 255, 255))
              canvas.paste(resized, ((width - resized.width) // 2, (height - resized.height) // 2))
              return canvas

          out = Path('assets/site-photos/web')
          out.mkdir(parents=True, exist_ok=True)
          fit_canvas(source, (1200, 1200)).save(out / 'hero-portada-desktop.webp', 'WEBP', quality=88, method=6)
          fit_canvas(source, (900, 900)).save(out / 'hero-portada-mobile.webp', 'WEBP', quality=86, method=6)
          PY

      - name: Patch homepage idempotently
        run: |
          python <<'PY'
          from pathlib import Path

          index = Path('index.html')
          html = index.read_text(encoding='utf-8')
          html = html.replace('20260718-1', '20260719-7').replace('20260719-2', '20260719-7')
          html = html.replace('hero-media hero-media-brand watermark-frame', 'hero-media hero-media-brand')
          start = html.find('        <div class="hero-grid" aria-hidden="true"></div>')
          if start >= 0:
              content_marker = '      <div class="hero-content">'
              content_start = html.find(content_marker, start)
              if content_start < 0:
                  raise SystemExit('No se encontró el inicio del contenido principal después de las superposiciones.')
              html = html[:start] + html[content_start:]
          html = html.replace('width="1920" height="1080"', 'width="1200" height="1200"')
          html = html.replace(
              'Vivienda, planos, herramientas y casco de Construcción Segura como representación de una obra planificada y protegida',
              'Afiche de Construcción Segura con servicios de asesoría técnica, vivienda, planos, casco y canales de atención',
          )
          index.write_text(html, encoding='utf-8')

          css_path = Path('hero-responsive.css')
          css = css_path.read_text(encoding='utf-8')
          css = css.replace('object-fit: cover;', 'object-fit: contain;').replace('#eef2f4', '#ffffff')
          css_path.write_text(css, encoding='utf-8')

          sw_path = Path('service-worker.js')
          sw = sw_path.read_text(encoding='utf-8')
          sw = sw.replace('mi-casa-segura-pwa-v9', 'mi-casa-segura-pwa-v10')
          sw = sw.replace('20260718-1', '20260719-7')
          sw_path.write_text(sw, encoding='utf-8')
          PY

      - name: Validate final site
        run: |
          python <<'PY'
          from pathlib import Path
          from PIL import Image
          expected = {
              'assets/site-photos/web/hero-portada-desktop.webp': (1200, 1200),
              'assets/site-photos/web/hero-portada-mobile.webp': (900, 900),
          }
          for name, size in expected.items():
              path = Path(name)
              image = Image.open(path)
              image.verify()
              image = Image.open(path)
              assert image.format == 'WEBP', (name, image.format)
              assert image.size == size, (name, image.size)
              assert path.stat().st_size < 350_000, (name, path.stat().st_size)
              print(name, image.size, path.stat().st_size)
          html = Path('index.html').read_text(encoding='utf-8')
          assert '20260719-7' in html
          assert 'hero-badge hero-badge-top' not in html
          assert 'hero-panel' not in html
          assert 'width="1200" height="1200"' in html
          css = Path('hero-responsive.css').read_text(encoding='utf-8')
          assert 'object-fit: contain;' in css
          assert 'object-fit: cover;' not in css
          sw = Path('service-worker.js').read_text(encoding='utf-8')
          assert 'mi-casa-segura-pwa-v10' in sw
          PY
          python scripts/check_site.py
          node --check script.js
          node --check privacy.js
          node --check site-global.js
          git diff --check

      - name: Remove all one-time files
        run: |
          rm -rf _incoming
          rm -f PORTADA_DIAGNOSTICO.txt PORTADA_NUEVA_EN_PROCESO.md
          rm -f .github/workflows/apply-official-homepage-poster.yml
          rm -f .github/workflows/apply-official-homepage-poster-fallback.yml
          rm -f .github/workflows/apply-official-homepage-poster-scan.yml

      - name: Commit and push validated result
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Actualizar portada con el nuevo afiche oficial'
          git push origin HEAD:agent/nueva-portada-afiche-v2

      - name: Merge only after every validation passed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr ready "${{ github.event.pull_request.number }}" || true
          gh pr merge "${{ github.event.pull_request.number }}" --squash --delete-branch=false
