name: Visual regression

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  compare-with-stable-backup:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out proposed version
        uses: actions/checkout@v4
        with:
          path: current
          fetch-depth: 1
          show-progress: false

      - name: Check out sparse stable baseline
        uses: actions/checkout@v4
        with:
          ref: backup/estable
          path: baseline
          fetch-depth: 1
          show-progress: false
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            /*
            !/review_photos/
            !/_incoming/
            !/debug.log

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Playwright
        working-directory: current
        run: |
          npm install --no-save --no-package-lock playwright@1.55.0
          npx playwright install --with-deps chromium

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install screenshot comparator
        run: python -m pip install --disable-pip-version-check Pillow==11.3.0

      - name: Render and compare current site with stable baseline
        working-directory: current
        shell: bash
        run: |
          set +e
          python -m http.server 8000 --bind 127.0.0.1 \
            > visual-current-server.log 2>&1 &
          current_server=$!

          python -m http.server 8001 --bind 127.0.0.1 \
            --directory ../baseline \
            > visual-baseline-server.log 2>&1 &
          baseline_server=$!

          cleanup() {
            kill "$current_server" "$baseline_server" 2>/dev/null || true
          }
          trap cleanup EXIT

          for url in http://127.0.0.1:8000/ http://127.0.0.1:8001/; do
            ready=0
            for attempt in $(seq 1 30); do
              if curl --fail --silent --show-error "$url" > /dev/null; then
                ready=1
                break
              fi
              sleep 1
            done
            if [ "$ready" -ne 1 ]; then
              echo "No se pudo iniciar $url" >&2
              exit 1
            fi
          done

          CURRENT_BASE_URL=http://127.0.0.1:8000 \
          BASELINE_BASE_URL=http://127.0.0.1:8001 \
          VISUAL_OUTPUT_DIR=visual-artifacts \
            node scripts/visual_check.mjs
          browser_status=$?

          python scripts/compare_screenshots.py
          comparison_status=$?

          if [ "$browser_status" -ne 0 ] || [ "$comparison_status" -ne 0 ]; then
            exit 1
          fi

      - name: Upload visual evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-evidence
          path: |
            current/visual-artifacts/
            current/visual-current-server.log
            current/visual-baseline-server.log
          if-no-files-found: warn
          retention-days: 7
