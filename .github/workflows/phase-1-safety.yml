name: Phase 1 safety checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate-assets-and-privacy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install image validator
        run: python -m pip install --disable-pip-version-check Pillow==11.3.0

      - name: Validate images and forbidden paths
        run: python scripts/check_assets.py

      - name: Validate all JavaScript files
        shell: bash
        run: |
          while IFS= read -r -d '' file; do
            node --check "$file"
          done < <(find . -type f -name '*.js' -not -path './.git/*' -print0)

      - name: Validate site structure
        run: python scripts/check_site.py
