name: Site checks

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  validate-static-site:
    runs-on: ubuntu-latest
    steps:
      - name: Check out working branch
        uses: actions/checkout@v4
        with:
          ref: priorizar-identidad-ingeniero-civil
          fetch-depth: 0
          show-progress: false

      - name: Apply identity update
        run: python scripts/apply_identity_update.py

      - name: Ensure public identity prioritizes engineer civil
        run: |
          matches=$(grep -RIlE 'Técnico en Edificaciones|Tecnico en Edificaciones' . --include='*.html' || true)
          if [ -n "$matches" ]; then
            echo "Retired public credential found in:"
            printf '%s\n' "$matches"
            exit 1
          fi

      - name: Validate local links and duplicate IDs
        run: python scripts/check_site.py

      - name: Validate JavaScript syntax
        run: |
          node --check script.js
          node --check privacy.js
          node --check site-global.js

      - name: Remove one-time migration files
        run: |
          rm -f scripts/apply_identity_update.py
          rm -f .github/workflows/apply-identity-update.yml

      - name: Commit updated public identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Retirar menciones públicas de la formación técnica [identity-applied]"
          git push origin HEAD:priorizar-identidad-ingeniero-civil
