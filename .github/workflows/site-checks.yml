name: Site checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate-static-site:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Apply identity update in validation workspace
        run: python scripts/apply_identity_update.py

      - name: Package transformed public files
        run: |
          git diff --name-only > transformed-file-list.txt
          tar -czf transformed-public-files.tar.gz -T transformed-file-list.txt

      - name: Upload transformed public files
        uses: actions/upload-artifact@v4
        with:
          name: transformed-public-files
          path: |
            transformed-public-files.tar.gz
            transformed-file-list.txt
          retention-days: 1

      - name: Ensure public identity prioritizes engineer civil
        run: |
          matches=$(grep -RIlE 'Técnico en Edificaciones|Tecnico en Edificaciones|SENCICO' . --include='*.html' || true)
          if [ -n "$matches" ]; then
            echo "Retired public credential found in:"
            printf '%s\n' "$matches"
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate local links and duplicate IDs
        run: python scripts/check_site.py

      - name: Validate JavaScript syntax
        run: |
          node --check script.js
          node --check privacy.js
          node --check site-global.js
