name: Fix pandereta public content

on:
  push:
    branches:
      - fix/pandereta-imagen-texto-general-20260723

permissions:
  contents: write

jobs:
  apply-fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install image validator
        run: python -m pip install --disable-pip-version-check Pillow==11.3.0

      - name: Recover verified WebP and rewrite public copy
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          target='assets/site-photos/casos/multifamiliar-seis-niveles/ladrillo-pandereta-de-canto.webp'
          old='assets/site-photos/casos/multifamiliar-seis-niveles/ladrillo-pandereta-de-canto.svg'
          mkdir -p "$(dirname "$target")"
          gh api "repos/${GITHUB_REPOSITORY}/git/blobs/075de44dc24e91706bab55b10d2c11398b2773fd" --jq .content \
            | tr -d '\n' | base64 -d > "$target"

          python - <<'PY'
          from pathlib import Path
          from PIL import Image
          import hashlib
          import re

          target = Path('assets/site-photos/casos/multifamiliar-seis-niveles/ladrillo-pandereta-de-canto.webp')
          expected = '231153df58de07bba42ca6b2fa6ce2377d6e827ab115ad0f688a781cdb138fd8'
          assert hashlib.sha256(target.read_bytes()).hexdigest() == expected
          with Image.open(target) as image:
              assert image.format == 'WEBP'
              assert image.size == (640, 360)
              image.load()
              assert not image.getexif()

          old = Path('assets/site-photos/casos/multifamiliar-seis-niveles/ladrillo-pandereta-de-canto.svg')
          old.unlink(missing_ok=True)

          js_path = Path('site-global.js')
          js = js_path.read_text(encoding='utf-8')
          replacements = {
              '/assets/site-photos/casos/multifamiliar-seis-niveles/ladrillo-pandereta-de-canto.svg': '/assets/site-photos/casos/multifamiliar-seis-niveles/ladrillo-pandereta-de-canto.webp',
              '<div class="error-media watermark-frame">': '<div class="error-media">',
              '<figure class="case-photo watermark-frame">': '<figure class="case-photo">',
              '<img src="${imageUrl}" alt="Ladrillo pandereta colocado de canto y con juntas irregulares" loading="lazy">': '<img class="pandereta-photo" src="${imageUrl}" alt="Ladrillo pandereta colocado de canto y con juntas irregulares" width="640" height="360" loading="lazy">',
              '<img src="${imageUrl}" alt="Ladrillo pandereta colocado de canto y con juntas irregulares junto a elementos de concreto">': '<img class="pandereta-photo" src="${imageUrl}" alt="Ladrillo pandereta colocado de canto y con juntas irregulares junto a elementos de concreto" width="640" height="360">',
              '<h3>Usar ladrillo pandereta como muro portante o colocarlo de canto.</h3>': '<h3>Por qué el ladrillo pandereta no debe soportar cargas ni colocarse de canto.</h3>',
              '<p>La pandereta es una unidad tubular destinada principalmente a tabiquería. No debe recibir cargas de una losa, viga o pisos superiores. Al colocarla de canto se reduce el espesor efectivo del paño y disminuye su rigidez frente a acciones perpendiculares.</p>': '<p>El ladrillo pandereta está pensado principalmente para dividir ambientes. No debe sostener losas, vigas ni pisos superiores. Cuando se coloca de canto, el muro queda más delgado y ofrece menos resistencia frente a movimientos y empujes perpendiculares, como los que pueden presentarse durante un sismo.</p>',
              '<li>Qué problema genera: mayor esbeltez, fisuración, desprendimiento o volcamiento y una respuesta frágil durante un sismo.</li>': '<li><strong>Qué puede ocurrir:</strong> el muro puede agrietarse, desprenderse o volcarse con mayor facilidad durante un sismo.</li>',
              '<li>Qué debería pasar: confirmar que sea un tabique no portante, respetar la orientación normal de la unidad y ejecutar juntas, arriostres y conexiones conforme al proyecto.</li>': '<li><strong>Cómo reconocer una ejecución segura:</strong> el muro debe funcionar solamente como división, conservar el espesor previsto y estar correctamente unido o arriostrado.</li>',
              '<li>Qué demuestra: ganar unos centímetros de espacio no justifica reducir la seguridad del muro.</li>': '<li><strong>Recomendación principal:</strong> no utilizar este ladrillo para cargar peso ni colocarlo de canto para ganar espacio.</li>',
              'Referencia útil: la <a class="inline-link" href="https://cdn.www.gob.pe/uploads/document/file/2366661/56%20E.070%20ALBA%C3%91ILERIA.pdf?v=1677250657" target="_blank" rel="noreferrer">Norma E.070 Albañilería</a> diferencia las unidades tubulares y limita su empleo estructural.': 'La <a class="inline-link" href="https://cdn.www.gob.pe/uploads/document/file/2366661/56%20E.070%20ALBA%C3%91ILERIA.pdf?v=1677250657" target="_blank" rel="noreferrer">Norma E.070 de Albañilería</a> diferencia estas unidades y limita su uso como elemento estructural.',
              'Ver observación técnica completa': 'Conocer más sobre este error de construcción',
              '<h2>El ladrillo pandereta no debe trabajar como muro portante ni asentarse de canto.</h2>': '<h2>Un ladrillo para dividir ambientes no debe utilizarse para sostener la edificación.</h2>',
              '<h3>Por qué requiere corrección</h3>': '<h3>Por qué representa un riesgo</h3>',
              '<p>La pandereta se emplea principalmente en tabiquería y no debe recibir cargas de losas, vigas o niveles superiores. En una vivienda multifamiliar de seis niveles en Lima no corresponde considerarla una unidad para muros portantes.</p>': '<p>La pandereta se utiliza principalmente para separar ambientes. No debe recibir el peso de losas, vigas o pisos superiores. En una edificación de varios niveles, confundir un tabique con un muro portante puede generar una condición insegura.</p>',
              '<p>Al colocarla de canto disminuye el espesor efectivo del paño. Como el momento de inercia geométrico depende fuertemente de esa dimensión, la rigidez frente a flexión fuera del plano se reduce de manera marcada. Esto aumenta la esbeltez y la vulnerabilidad ante aceleraciones sísmicas, empujes perpendiculares, fisuración, desprendimiento o volcamiento.</p>': '<p>Al colocarla de canto, el muro queda más delgado. Esa reducción disminuye notablemente su rigidez frente a movimientos perpendiculares, aumenta su esbeltez y facilita la aparición de grietas, desprendimientos o volcamiento durante un sismo.</p>',
              '<p class="technical-note">Antes de tarrajear debe verificarse en planos que sea un tabique no portante, impedir que reciba carga estructural y revisar orientación, trabazón, plomo, arriostramiento, conexión con la estructura y las juntas.</p>': '<p class="technical-note">Antes de cubrir el muro conviene confirmar que sea únicamente una división, que no esté soportando peso y que su orientación, juntas y unión con la estructura sean las previstas en el proyecto.</p>',
              'Ver guía completa sobre pandereta, inercia y sismorresistencia': 'Leer la explicación completa en lenguaje sencillo',
              '<article class="future-card" data-pandereta-verification><span>05</span><h3>Función del muro de pandereta</h3><p>Confirmar que sea un tabique no portante, que no reciba carga y que su orientación, juntas y arriostramiento correspondan al proyecto.</p></article>': '<article class="future-card" data-pandereta-verification><span>05</span><h3>Comprobar para qué sirve el muro</h3><p>Verificar que solo divida ambientes, que no sostenga peso y que esté colocado y unido de acuerdo con los planos.</p></article>',
          }
          for old_text, new_text in replacements.items():
              if old_text not in js:
                  raise SystemExit(f'No se encontró el texto esperado en site-global.js: {old_text[:80]}')
              js = js.replace(old_text, new_text)
          js_path.write_text(js, encoding='utf-8')

          article_path = Path('errores/ladrillo-pandereta-muro-portante-asentado-de-canto.html')
          article = article_path.read_text(encoding='utf-8')
          article = article.replace('ladrillo-pandereta-de-canto.svg', 'ladrillo-pandereta-de-canto.webp')
          article = article.replace('<figure class="article-figure reveal">', '<figure class="article-figure article-figure-original-watermark reveal">')
          article = article.replace('El ladrillo pandereta no debe trabajar como muro portante ni asentarse de canto.', 'Por qué el ladrillo pandereta no debe soportar cargas ni colocarse de canto.')
          article = article.replace('El ladrillo pandereta es una unidad tubular destinada principalmente a tabiquería. Usarlo para recibir cargas o girarlo para formar un paño más delgado cambia la forma en que trabaja el muro y aumenta su vulnerabilidad frente a acciones sísmicas.', 'El ladrillo pandereta se utiliza principalmente para separar ambientes. No está diseñado para sostener losas, vigas o pisos superiores. Colocarlo de canto deja un muro más delgado y más vulnerable frente a los movimientos de un sismo.')
          article = article.replace('<h2>Error común</h2><p>Utilizar ladrillo pandereta como si fuera una unidad apta para recibir cargas de losas, vigas o pisos superiores, o asentarlo de canto para reducir el espesor del muro.</p>', '<h2>Qué se está haciendo mal</h2><p>Se está utilizando un ladrillo de tabiquería para soportar peso o se está colocando de canto con la intención de ganar algunos centímetros.</p>')
          article = article.replace('<h2>Por qué ocurre</h2><p>Se confunde un tabique de cerramiento con un muro estructural, se busca ganar algunos centímetros o se continúa la obra sin revisar planos, especificaciones y orientación normal de asentado.</p>', '<h2>Por qué puede parecer una solución rápida</h2><p>A veces se busca ahorrar espacio o se confunde una pared divisoria con un muro que puede sostener la edificación. Esa diferencia debe estar definida en los planos.</p>')
          article = article.replace('<h2>Consecuencias</h2><p>Puede producirse fisuración, trituración localizada de la unidad, pérdida de estabilidad fuera del plano, desprendimiento y una respuesta frágil ante movimientos sísmicos.</p>', '<h2>Qué puede pasar durante un sismo</h2><p>El muro puede agrietarse, desprenderse o volcarse con mayor facilidad. También puede romperse de manera frágil si recibe un peso para el que no fue diseñado.</p>')
          article = article.replace('<h2>Cómo hacerlo correctamente</h2><p>Definir en los planos qué muros son portantes y cuáles son tabiques. Los muros que reciben carga deben ejecutarse con unidades, espesor, mortero, confinamiento y detalles previstos por el diseño estructural.</p>', '<h2>Qué debería hacerse</h2><p>Los planos deben indicar cuáles son muros estructurales y cuáles solo dividen ambientes. Un muro que recibe peso debe construirse con materiales, espesor y refuerzos definidos por el diseño estructural.</p>')
          article = article.replace('Al colocar la pandereta de canto disminuyen el espesor efectivo y la rigidez fuera del plano.', 'Colocar la pandereta de canto deja un muro más delgado y menos resistente.')
          article = article.replace('El momento de inercia geométrico de una sección rectangular depende del cubo de la dimensión que trabaja como espesor. Por eso, al reducir esa dimensión, la rigidez frente a flexión perpendicular al muro disminuye de manera marcada. El paño queda más esbelto y más sensible a vibraciones, empujes y aceleraciones sísmicas.', 'Cuando se reduce el espesor del muro, su capacidad para resistir movimientos perpendiculares disminuye de forma importante. En términos simples, queda más flexible, más esbelto y con mayor posibilidad de agrietarse o volcarse durante un sismo.')
          article_path.write_text(article, encoding='utf-8')

          css_path = Path('errores/errores-articulos.css')
          css = css_path.read_text(encoding='utf-8')
          marker = '.article-figure-original-watermark::before,\n.article-figure-original-watermark::after {\n  display: none;\n}\n'
          if marker not in css:
              css += '\n' + marker
          css_path.write_text(css, encoding='utf-8')

          styles_path = Path('styles.css')
          styles = styles_path.read_text(encoding='utf-8')
          rule = '.error-media .pandereta-photo,\n.case-photo .pandereta-photo {\n  width: 100%;\n  height: auto;\n  aspect-ratio: 16 / 9;\n  object-fit: cover;\n}\n'
          if rule not in styles:
              styles += '\n' + rule
          styles_path.write_text(styles, encoding='utf-8')

          sw_path = Path('service-worker.js')
          sw = sw_path.read_text(encoding='utf-8')
          match = re.search(r'mi-casa-segura-pwa-v(\d+)', sw)
          if not match:
              raise SystemExit('No se encontró la versión de caché')
          next_version = int(match.group(1)) + 1
          sw = sw[:match.start()] + f'mi-casa-segura-pwa-v{next_version}' + sw[match.end():]
          sw_path.write_text(sw, encoding='utf-8')
          PY

          python scripts/check_assets.py
          python scripts/check_resources.py
          python scripts/check_site.py
          node --check site-global.js

      - name: Commit verified correction and remove temporary files
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/fix-pandereta-public-content.yml .pandereta-fix-trigger
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Corregir imagen y adaptar explicación de ladrillo pandereta al público general'
          git push origin HEAD:fix/pandereta-imagen-texto-general-20260723
