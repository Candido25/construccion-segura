name: Site checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate-static-site:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Scan retired public credential
        run: |
          grep -RIlE 'Técnico en Edificaciones|Tecnico en Edificaciones|SENCICO' . --include='*.html' > retired-credential-matches.txt || true

      - name: Upload credential scan
        uses: actions/upload-artifact@v4
        with:
          name: retired-credential-scan
          path: retired-credential-matches.txt
          retention-days: 1

      - name: Ensure public identity prioritizes engineer civil
        run: |
          if [ -s retired-credential-matches.txt ]; then
            echo "Retired public credential found in:"
            cat retired-credential-matches.txt
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate local links and duplicate IDs
        run: python scripts/check_site.py

      - name: Validate JavaScript syntax
        run: |
          node --check script.js
          node --check privacy.js
          node --check site-global.js
