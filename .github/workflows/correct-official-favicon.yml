name: Correct official favicon

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out favicon branch
        uses: actions/checkout@v4
        with:
          ref: fix/favicon-logo-oficial-20260719
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Pillow
        run: python -m pip install --quiet pillow

      - name: Generate favicons from official square mark
        run: |
          python <<'PY'
          from pathlib import Path
          from PIL import Image
          import hashlib

          source_path = Path('app-icon-192.png')
          source = Image.open(source_path).convert('RGBA')
          alpha = source.getchannel('A')
          visible = alpha.point(lambda value: 255 if value >= 10 else 0)
          bbox = visible.getbbox()
          if bbox is None:
              raise SystemExit('El ícono oficial no contiene píxeles visibles')
          cropped = source.crop(bbox)

          def make_icon(size, padding_ratio=0.04, background=None):
              bg = (0, 0, 0, 0) if background is None else background
              canvas = Image.new('RGBA', (size, size), bg)
              limit = int(size * (1 - 2 * padding_ratio))
              scale = min(limit / cropped.width, limit / cropped.height)
              target = (max(1, round(cropped.width * scale)), max(1, round(cropped.height * scale)))
              resized = cropped.resize(target, Image.Resampling.LANCZOS)
              canvas.alpha_composite(resized, ((size - target[0]) // 2, (size - target[1]) // 2))
              return canvas

          make_icon(48).save('favicon-48.png', optimize=True)
          make_icon(180, 0.10, (255, 255, 255, 255)).convert('RGB').save('apple-touch-icon.png', optimize=True)
          make_icon(256).save('favicon.ico', sizes=[(16,16), (32,32), (48,48), (64,64), (128,128), (256,256)])

          report = []
          for name, expected in {'favicon-48.png': (48,48), 'apple-touch-icon.png': (180,180)}.items():
              image = Image.open(name)
              image.verify()
              image = Image.open(name)
              if image.size != expected:
                  raise SystemExit(f'{name}: dimensión incorrecta {image.size}')
              data = Path(name).read_bytes()
              report.append(f'{name} size={image.size} bytes={len(data)} sha256={hashlib.sha256(data).hexdigest()}')
          ico = Image.open('favicon.ico')
          if ico.format != 'ICO':
              raise SystemExit('favicon.ico no es un ICO válido')
          report.append(f'favicon.ico bytes={Path("favicon.ico").stat().st_size} sha256={hashlib.sha256(Path("favicon.ico").read_bytes()).hexdigest()}')
          report.append(f'source={source_path} source_size={source.size} crop={bbox} crop_size={cropped.size}')
          Path('favicon-report.txt').write_text('\n'.join(report) + '\n', encoding='utf-8')
          print('\n'.join(report))
          PY

      - name: Validate site
        run: |
          python scripts/check_site.py
          node --check script.js
          node --check privacy.js
          node --check site-global.js
          git diff --check

      - name: Upload verification artifact
        uses: actions/upload-artifact@v4
        with:
          name: favicon-oficial-corregido
          path: |
            favicon.ico
            favicon-48.png
            apple-touch-icon.png
            favicon-report.txt
          if-no-files-found: error

      - name: Remove temporary files
        run: |
          rm -f .github/workflows/correct-official-favicon.yml
          rm -f favicon-report.txt

      - name: Verify exact final scope
        run: |
          git add -A
          changed=$(git diff --cached --name-only | sort)
          expected=$(printf '%s\n' .github/workflows/correct-official-favicon.yml apple-touch-icon.png favicon-48.png favicon.ico | sort)
          test "$changed" = "$expected" || { echo 'Cambios inesperados:'; echo "$changed"; exit 1; }

      - name: Commit corrected favicon
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'Corregir favicon con el símbolo oficial'
          git push origin HEAD:fix/favicon-logo-oficial-20260719
