name: Apply official homepage poster fallback

on:
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  recover-validate-and-merge:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/nueva-portada-afiche-v2
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install image tools
        run: |
          python -m pip install --quiet pillow
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg

      - name: Recover poster with multiple safe fallbacks
        run: |
          git fetch origin portada-profesional-v6:refs/remotes/origin/portada-profesional-v6
          mkdir -p /tmp/poster-candidates
          git show origin/portada-profesional-v6:site-global.js > /tmp/poster-candidates/site-global.js || true
          git show origin/portada-profesional-v6:assets/brand/portada-principal-construccion-segura.webp > /tmp/poster-candidates/historical-asset.webp || true
          git show origin/portada-profesional-v6:assets/brand/portada-fuente-decodificada-v6.png > /tmp/poster-candidates/historical-source.png || true

          python <<'PY'
          from pathlib import Path
          from PIL import Image
          import base64
          import io
          import re
          import subprocess

          work = Path('/tmp/poster-candidates')
          candidates = []

          js = work / 'site-global.js'
          if js.exists() and js.stat().st_size:
              text = js.read_text(encoding='utf-8', errors='ignore')
              match = re.search(r'data:image/webp;base64,([A-Za-z0-9+/=]+)', text)
              if match:
                  candidates.append(('embedded-data-uri', base64.b64decode(match.group(1))))

          asset = work / 'historical-asset.webp'
          if asset.exists() and asset.stat().st_size:
              candidates.append(('historical-asset', asset.read_bytes()))

          png = work / 'historical-source.png'
          if png.exists() and png.stat().st_size:
              candidates.append(('historical-png', png.read_bytes()))

          def variants(data):
              yielded = set()
              def emit(value):
                  digest = hash(value)
                  if digest not in yielded:
                      yielded.add(digest)
                      return value
                  return None

              value = emit(data)
              if value is not None:
                  yield value

              if len(data) >= 12 and data[:4] == b'RIFF' and data[8:12] != b'WEBP':
                  patched = bytearray(data)
                  patched[8:12] = b'WEBP'
                  value = emit(bytes(patched))
                  if value is not None:
                      yield value

              try:
                  compact = b''.join(data.split())
                  decoded = base64.b64decode(compact, validate=True)
                  value = emit(decoded)
                  if value is not None:
                      yield value
                  if len(decoded) >= 12 and decoded[:4] == b'RIFF' and decoded[8:12] != b'WEBP':
                      patched = bytearray(decoded)
                      patched[8:12] = b'WEBP'
                      value = emit(bytes(patched))
                      if value is not None:
                          yield value
              except Exception:
                  pass

          source = None
          selected = None
          errors = []

          for label, data in candidates:
              for number, candidate in enumerate(variants(data), start=1):
                  try:
                      image = Image.open(io.BytesIO(candidate)).convert('RGB')
                      image.load()
                      if image.width < 700 or image.height < 700:
                          raise ValueError(f'resolución insuficiente: {image.size}')
                      source = image
                      selected = f'{label} variante {number} mediante Pillow'
                      break
                  except Exception as exc:
                      errors.append(f'{label} variante {number} Pillow: {exc!r}')
                      temp = work / f'{label}-{number}.bin'
                      output = work / f'{label}-{number}.png'
                      temp.write_bytes(candidate)
                      result = subprocess.run(
                          ['ffmpeg', '-hide_banner', '-loglevel', 'error', '-y', '-i', str(temp), '-frames:v', '1', str(output)],
                          capture_output=True,
                          text=True,
                      )
                      if result.returncode == 0 and output.exists():
                          try:
                              image = Image.open(output).convert('RGB')
                              image.load()
                              if image.width < 700 or image.height < 700:
                                  raise ValueError(f'resolución insuficiente: {image.size}')
                              source = image
                              selected = f'{label} variante {number} mediante FFmpeg'
                              break
                          except Exception as ff_exc:
                              errors.append(f'{label} variante {number} FFmpeg: {ff_exc!r}')
                      else:
                          errors.append(f'{label} variante {number} FFmpeg: {result.stderr[-300:]}')
              if source is not None:
                  break

          if source is None:
              raise SystemExit('No fue posible recuperar el afiche. Diagnóstico:\n' + '\n'.join(errors))

          print('Fuente seleccionada:', selected, source.size)

          def fit_canvas(image, size):
              width, height = size
              scale = min(width / image.width, height / image.height)
              resized = image.resize(
                  (round(image.width * scale), round(image.height * scale)),
                  Image.Resampling.LANCZOS,
              )
              canvas = Image.new('RGB', size, (255, 255, 255))
              canvas.paste(resized, ((width - resized.width) // 2, (height - resized.height) // 2))
              return canvas

          out = Path('assets/site-photos/web')
          out.mkdir(parents=True, exist_ok=True)
          fit_canvas(source, (1200, 1200)).save(out / 'hero-portada-desktop.webp', 'WEBP', quality=88, method=6)
          fit_canvas(source, (900, 900)).save(out / 'hero-portada-mobile.webp', 'WEBP', quality=86, method=6)
          PY

      - name: Apply idempotent markup and cache changes
        run: |
          python <<'PY'
          from pathlib import Path

          index = Path('index.html')
          html = index.read_text(encoding='utf-8')
          for old in ('20260718-1', '20260719-2', '20260719-7'):
              html = html.replace(old, '20260719-7')
          html = html.replace('hero-media hero-media-brand watermark-frame', 'hero-media hero-media-brand')
          start = html.find('        <div class="hero-grid" aria-hidden="true"></div>')
          if start >= 0:
              end_marker = '        </div>\n\n      <div class="hero-content">'
              end = html.find(end_marker, start)
              if end < 0:
                  raise SystemExit('Se encontró el inicio de las superposiciones, pero no su cierre.')
              html = html[:start] + '\n      <div class="hero-content">' + html[end + len(end_marker):]
          html = html.replace('width="1920" height="1080"', 'width="1200" height="1200"')
          html = html.replace(
              'Vivienda, planos, herramientas y casco de Construcción Segura como representación de una obra planificada y protegida',
              'Afiche de Construcción Segura con servicios de asesoría técnica, vivienda, planos, casco y canales de atención',
          )
          index.write_text(html, encoding='utf-8')

          css_path = Path('hero-responsive.css')
          css = css_path.read_text(encoding='utf-8')
          css = css.replace('object-fit: cover;', 'object-fit: contain;')
          css = css.replace('#eef2f4', '#ffffff')
          css_path.write_text(css, encoding='utf-8')

          sw_path = Path('service-worker.js')
          sw = sw_path.read_text(encoding='utf-8')
          sw = sw.replace('mi-casa-segura-pwa-v9', 'mi-casa-segura-pwa-v10')
          sw = sw.replace('20260718-1', '20260719-7')
          sw_path.write_text(sw, encoding='utf-8')
          PY

      - name: Validate final result
        run: |
          python <<'PY'
          from pathlib import Path
          from PIL import Image
          expected = {
              'assets/site-photos/web/hero-portada-desktop.webp': (1200, 1200),
              'assets/site-photos/web/hero-portada-mobile.webp': (900, 900),
          }
          for name, size in expected.items():
              path = Path(name)
              image = Image.open(path)
              image.verify()
              image = Image.open(path)
              assert image.format == 'WEBP', (name, image.format)
              assert image.size == size, (name, image.size)
              assert path.stat().st_size < 350_000, (name, path.stat().st_size)
              print(name, image.size, path.stat().st_size)
          html = Path('index.html').read_text(encoding='utf-8')
          assert '20260719-7' in html
          assert 'hero-badge hero-badge-top' not in html
          assert 'hero-panel' not in html
          assert 'width="1200" height="1200"' in html
          css = Path('hero-responsive.css').read_text(encoding='utf-8')
          assert 'object-fit: contain;' in css
          assert 'object-fit: cover;' not in css
          PY
          python scripts/check_site.py
          node --check script.js
          node --check privacy.js
          node --check site-global.js
          git diff --check

      - name: Remove all temporary automation
        run: |
          rm -rf _incoming
          rm -f PORTADA_DIAGNOSTICO.txt PORTADA_NUEVA_EN_PROCESO.md
          rm -f .github/workflows/apply-official-homepage-poster.yml
          rm -f .github/workflows/apply-official-homepage-poster-fallback.yml

      - name: Commit validated result
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            echo 'No hay cambios pendientes; el resultado ya estaba aplicado.'
          else
            git commit -m 'Actualizar portada con el nuevo afiche oficial'
            git push origin HEAD:agent/nueva-portada-afiche-v2
          fi

      - name: Merge only after validation
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr ready "${{ github.event.pull_request.number }}" || true
          gh pr merge "${{ github.event.pull_request.number }}" --squash --delete-branch=false
