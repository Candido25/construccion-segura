name: Generate corrected icons once

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  generate-icons:
    if: github.head_ref == 'saneamiento/fase-1-seguridad-20260719' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Check out the controlled branch
        uses: actions/checkout@v4
        with:
          ref: saneamiento/fase-1-seguridad-20260719
          fetch-depth: 0
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Pillow
        run: python -m pip install --disable-pip-version-check Pillow==11.3.0

      - name: Generate and validate official icons
        run: |
          python scripts/generate_app_icons.py
          python scripts/check_assets.py

      - name: Commit only regenerated icons
        shell: bash
        run: |
          if git diff --quiet -- favicon-48.png app-icon-192.png app-icon-maskable-512.png; then
            echo "Los iconos ya coinciden con la generación válida."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add favicon-48.png app-icon-192.png app-icon-maskable-512.png
          git commit -m "Regenerar iconos válidos desde fuentes oficiales"
          git push origin HEAD:saneamiento/fase-1-seguridad-20260719
