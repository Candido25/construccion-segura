name: Inspect official app icons

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Check out favicon branch
        uses: actions/checkout@v4
        with:
          ref: fix/favicon-logo-oficial-20260719

      - name: Verify icon files exist
        run: |
          test -f app-icon-192.png
          test -f app-icon-maskable-512.png
          file app-icon-192.png app-icon-maskable-512.png
          sha256sum app-icon-192.png app-icon-maskable-512.png > app-icon-report.txt

      - name: Upload current square icons
        uses: actions/upload-artifact@v4
        with:
          name: iconos-cuadrados-actuales
          path: |
            app-icon-192.png
            app-icon-maskable-512.png
            app-icon-report.txt
          if-no-files-found: error
