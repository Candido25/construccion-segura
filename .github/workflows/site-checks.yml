name: Site checks

on:
  push:
    branches: [identidad-publica-ingeniero]

permissions:
  contents: write

jobs:
  validate-static-site:
    if: ${{ !contains(github.event.head_commit.message, '[engineer-label-applied]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out working branch
        uses: actions/checkout@v4
        with:
          ref: identidad-publica-ingeniero
          fetch-depth: 0
          show-progress: false

      - name: Apply public label migration
        run: python scripts/apply_engineer_public_label.py

      - name: Validate local links and duplicate IDs
        run: python scripts/check_site.py

      - name: Validate JavaScript syntax
        run: |
          node --check script.js
          node --check privacy.js
          node --check site-global.js

      - name: Restore permanent site checks
        run: |
          cat > .github/workflows/site-checks.yml <<'YAML'
          name: Site checks

          on:
            pull_request:
              branches: [main]
            push:
              branches: [main]

          permissions:
            contents: read

          jobs:
            validate-static-site:
              runs-on: ubuntu-latest
              steps:
                - name: Check out repository
                  uses: actions/checkout@v4
                  with:
                    show-progress: false

                - name: Ensure public identity uses Ingeniero
                  run: |
                    matches=$(grep -RIlE 'Ing\. Civil|Ingeniero civil|ingeniero civil' . --include='*.html' || true)
                    if [ -n "$matches" ]; then
                      echo "Retired specialty found in:"
                      printf '%s\n' "$matches"
                      exit 1
                    fi

                - name: Set up Python
                  uses: actions/setup-python@v5
                  with:
                    python-version: "3.12"

                - name: Validate local links and duplicate IDs
                  run: python scripts/check_site.py

                - name: Validate JavaScript syntax
                  run: |
                    node --check script.js
                    node --check privacy.js
                    node --check site-global.js
          YAML

      - name: Remove one-time migration script
        run: rm -f scripts/apply_engineer_public_label.py

      - name: Commit updated public identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No public identity changes to commit."
            exit 0
          fi
          git commit -m "Mostrar identidad pública únicamente como Ingeniero [engineer-label-applied]"
          git push origin HEAD:identidad-publica-ingeniero
