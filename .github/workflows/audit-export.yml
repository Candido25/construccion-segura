name: Export main for exhaustive audit

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create exact tracked snapshot
        run: |
          git archive --format=tar.gz --output=construccion-segura-main-audit.tar.gz HEAD

      - name: Upload audit snapshot
        uses: actions/upload-artifact@v4
        with:
          name: construccion-segura-main-audit
          path: construccion-segura-main-audit.tar.gz
          if-no-files-found: error
          retention-days: 7
