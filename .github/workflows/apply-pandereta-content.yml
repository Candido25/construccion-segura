name: Apply pandereta content

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: content/ladrillo-pandereta-observacion-20260721
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Apply controlled content changes
        run: |
          cat > /tmp/apply.py <<'PY'
          from pathlib import Path

          def one(path, old, new):
              p = Path(path)
              text = p.read_text(encoding="utf-8")
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{path}: expected one marker, found {count}: {old[:70]!r}")
              p.write_text(text.replace(old, new, 1), encoding="utf-8")

          case = "casos/seguimiento-vivienda-multifamiliar-seis-niveles.html"
          p = Path(case)
          text = p.read_text(encoding="utf-8")
          replacements = {
              "Análisis fotográfico de cuatro observaciones en una vivienda multifamiliar de seis niveles en Lima: dintel, recubrimiento de columna, escalera y cangrejeras en viga.": "Análisis fotográfico de cinco observaciones en una vivienda multifamiliar de seis niveles en Lima: pandereta de canto, dintel, recubrimiento, escalera y cangrejeras.",
              "Cuatro observaciones técnicas en una vivienda multifamiliar de seis niveles": "Cinco observaciones técnicas en una vivienda multifamiliar de seis niveles",
              "Revisión fotográfica de albañilería, recubrimiento, escalera y calidad del concreto en una viga.": "Revisión fotográfica de unidades tubulares, albañilería, recubrimiento, escalera y calidad del concreto.",
              "Vivienda multifamiliar de seis niveles: cuatro observaciones técnicas.": "Vivienda multifamiliar de seis niveles: cinco observaciones técnicas.",
              "Las fotografías muestran situaciones relacionadas con un vano de albañilería, una columna de concreto armado, una escalera y una viga.": "Las fotografías muestran situaciones relacionadas con una unidad tubular colocada de canto, un vano de albañilería, una columna, una escalera y una viga.",
              "<strong>4 fotografías analizadas · Lima</strong>": "<strong>5 fotografías analizadas · Lima</strong>",
              "<strong>Vano, columna, escalera y viga</strong>": "<strong>Unidad tubular, vano, columna, escalera y viga</strong>",
              "Revisión técnica publicada: 13 de julio de 2026 · Proyecto ubicado en Lima": "Revisión técnica actualizada: 21 de julio de 2026 · Proyecto ubicado en Lima",
              '"dateModified":"2026-07-13"': '"dateModified":"2026-07-21"',
          }
          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f"Missing case marker: {old[:70]}")
              text = text.replace(old, new)
          p.write_text(text, encoding="utf-8")

          one(
              case,
              '      "https://www.construccionsegura.org.pe/assets/site-photos/casos/multifamiliar-seis-niveles/garganta-escalera.webp",\n      "https://www.construccionsegura.org.pe/assets/site-photos/web/observacion-viga-cangrejeras.webp"',
              '      "https://www.construccionsegura.org.pe/assets/site-photos/casos/multifamiliar-seis-niveles/garganta-escalera.webp",\n      "https://www.construccionsegura.org.pe/assets/site-photos/casos/multifamiliar-seis-niveles/ladrillo-pandereta-de-canto.svg",\n      "https://www.construccionsegura.org.pe/assets/site-photos/web/observacion-viga-cangrejeras.webp"',
          )

          one(
              case,
              '        <a class="case-index-card case-index-alert" href="#dintel-improvisado">',
              '        <a class="case-index-card case-index-alert" href="#pandereta-de-canto"><span>Deficiencia visible</span><strong>Pandereta de canto</strong><small>La unidad tubular no debe recibir carga ni formar un paño resistente improvisado.</small></a>\n        <a class="case-index-card case-index-alert" href="#dintel-improvisado">',
          )

          observation = '''

      <article class="case-item reveal" id="pandereta-de-canto">
        <figure class="case-photo watermark-frame">
          <img src="../assets/site-photos/casos/multifamiliar-seis-niveles/ladrillo-pandereta-de-canto.svg" alt="Ladrillo pandereta colocado de canto y con juntas irregulares junto a elementos de concreto">
          <figcaption>Observación 5. Unidad tubular colocada de canto, con juntas irregulares, registrada el 21 de julio de 2026.</figcaption>
        </figure>
        <div class="case-copy">
          <span class="case-number">05 · Albañilería y comportamiento sísmico</span>
          <div class="case-meta"><span>Condición: deficiencia visible</span><span>Elemento: muro con unidad tubular</span></div>
          <h2>El ladrillo pandereta no debe trabajar como muro portante ni asentarse de canto.</h2>
          <p class="case-summary"><strong>Descripción:</strong> se observa una unidad tubular tipo pandereta colocada de canto. Las juntas presentan espesores variables y el paño está en contacto con elementos de concreto.</p>
          <h3>Por qué requiere corrección</h3>
          <p>La pandereta se emplea principalmente en tabiquería y no debe recibir cargas de losas, vigas o niveles superiores. En una vivienda multifamiliar de seis niveles en Lima no corresponde considerarla una unidad para muros portantes.</p>
          <p>Al colocarla de canto disminuye el espesor efectivo del paño. Como el momento de inercia geométrico depende fuertemente de esa dimensión, la rigidez frente a flexión fuera del plano se reduce de manera marcada. Esto aumenta la esbeltez y la vulnerabilidad ante aceleraciones sísmicas, empujes perpendiculares, fisuración, desprendimiento o volcamiento.</p>
          <p class="technical-note">Antes de tarrajear debe verificarse en planos que sea un tabique no portante, impedir que reciba carga estructural y revisar orientación, trabazón, plomo, arriostramiento, conexión con la estructura y las juntas.</p>
          <p><a class="inline-link" href="../errores/ladrillo-pandereta-muro-portante-asentado-de-canto.html">Ver guía completa sobre pandereta, inercia y sismorresistencia</a></p>
        </div>
      </article>'''
          one(
              case,
              '    </section>\n\n    <section class="section article-content article-section reveal" id="verificaciones-necesarias">',
              observation + '\n    </section>\n\n    <section class="section article-content article-section reveal" id="verificaciones-necesarias">',
          )

          one(
              case,
              '<article class="future-card"><span>04</span><h3>Alcance de las cangrejeras</h3><p>Determinar profundidad, extensión, estado del acero, calidad del concreto y procedimiento de reparación.</p></article>',
              '<article class="future-card"><span>04</span><h3>Alcance de las cangrejeras</h3><p>Determinar profundidad, extensión, estado del acero, calidad del concreto y procedimiento de reparación.</p></article>\n        <article class="future-card"><span>05</span><h3>Función del muro de pandereta</h3><p>Confirmar que sea un tabique no portante, que no reciba carga y que su orientación, juntas y arriostramiento correspondan al proyecto.</p></article>',
          )

          errors = "errores-frecuentes.html"
          one(
              errors,
              '      <div class="topic-library-grid">\n        <a class="topic-library-card" href="errores/cangrejeras-recubrimiento-separadores-inadecuados.html">',
              '      <div class="topic-library-grid">\n        <a class="topic-library-card" href="errores/ladrillo-pandereta-muro-portante-asentado-de-canto.html"><strong>Ladrillo pandereta como muro portante o de canto</strong><span>Una unidad tubular no debe recibir carga ni perder espesor resistente.</span></a>\n        <a class="topic-library-card" href="errores/cangrejeras-recubrimiento-separadores-inadecuados.html">',
          )

          error_summary = '''      <div class="error-article reveal">
        <div class="error-media watermark-frame">
          <img src="assets/site-photos/casos/multifamiliar-seis-niveles/ladrillo-pandereta-de-canto.svg" alt="Ladrillo pandereta colocado de canto y con juntas irregulares" loading="lazy">
        </div>
        <div>
          <span>Albañilería y sismorresistencia</span>
          <h3>Usar ladrillo pandereta como muro portante o colocarlo de canto.</h3>
          <p>La pandereta es una unidad tubular destinada principalmente a tabiquería. No debe recibir las cargas de una losa, viga o pisos superiores. Al colocarla de canto se reduce el espesor efectivo del paño y disminuye su rigidez frente a acciones perpendiculares.</p>
          <ul>
            <li>Qué problema genera: mayor esbeltez, fisuración, desprendimiento o volcamiento y una respuesta frágil durante un sismo.</li>
            <li>Qué debería pasar: confirmar que sea un tabique no portante, respetar la orientación normal de la unidad y ejecutar juntas, arriostres y conexiones conforme al proyecto.</li>
            <li>Qué demuestra: ganar unos centímetros de espacio no justifica reducir la seguridad del muro.</li>
          </ul>
          <p>Referencia útil: la <a class="inline-link" href="https://cdn.www.gob.pe/uploads/document/file/2366661/56%20E.070%20ALBA%C3%91ILERIA.pdf?v=1677250657" target="_blank" rel="noreferrer">Norma E.070 Albañilería</a> diferencia las unidades tubulares y limita su empleo estructural.</p>
          <p><a class="inline-link" href="errores/ladrillo-pandereta-muro-portante-asentado-de-canto.html">Ver observación técnica completa</a></p>
        </div>
      </div>

'''
          one(
              errors,
              '      <div class="error-article reveal">\n        <div class="error-media watermark-frame">\n          <img src="assets/site-photos/web/observacion-viga-cangrejeras.webp"',
              error_summary + '      <div class="error-article reveal">\n        <div class="error-media watermark-frame">\n          <img src="assets/site-photos/web/observacion-viga-cangrejeras.webp"',
          )

          cases = "casos-de-obra.html"
          p = Path(cases)
          text = p.read_text(encoding="utf-8")
          changes = {
              "<strong>4 observaciones técnicas</strong>": "<strong>5 observaciones técnicas</strong>",
              "<p>Albañilería, recubrimiento, escalera y concreto armado.</p>": "<p>Unidades tubulares, albañilería, recubrimiento, escalera y concreto armado.</p>",
              '<span class="project-card-status">4 observaciones</span>': '<span class="project-card-status">5 observaciones</span>',
              "El análisis revisa un vano de albañilería, el recubrimiento de una columna, la garganta de una escalera y la calidad del concreto en una viga.": "El análisis revisa una unidad tubular colocada de canto, un vano, el recubrimiento de una columna, una escalera y la calidad del concreto en una viga.",
              "<span>2 deficiencias visibles</span>": "<span>3 deficiencias visibles</span>",
              "<h2>Cuatro situaciones observadas en el proyecto.</h2>": "<h2>Cinco situaciones observadas en el proyecto.</h2>",
          }
          for old, new in changes.items():
              if text.count(old) != 1:
                  raise SystemExit(f"Missing cases marker: {old[:60]}")
              text = text.replace(old, new, 1)
          marker = '<article class="case-method-card"><span>4</span><h3>Concreto en viga</h3><p>Cangrejeras, acero visible y presencia de madera en una zona que requiere evaluación y reparación técnicamente definida.</p></article>'
          addition = marker + '\n          <article class="case-method-card"><span>5</span><h3>Pandereta colocada de canto</h3><p>Unidad tubular utilizada con menor espesor efectivo, que no debe recibir cargas y requiere revisión de juntas, arriostramiento y conexión.</p></article>'
          if text.count(marker) != 1:
              raise SystemExit("Missing fifth-card insertion marker")
          p.write_text(text.replace(marker, addition, 1), encoding="utf-8")

          one(
              "casos/caso-multifamiliar.css",
              '  .case-index,\n  .future-grid {\n    grid-template-columns: repeat(4, minmax(0, 1fr));\n  }',
              '  .case-index {\n    grid-template-columns: repeat(3, minmax(0, 1fr));\n  }\n\n  .future-grid {\n    grid-template-columns: repeat(4, minmax(0, 1fr));\n  }',
          )
          one(
              "casos-de-obra.css",
              '  .case-method-grid {\n    grid-template-columns: repeat(4, minmax(0, 1fr));\n  }',
              '  .case-method-grid {\n    grid-template-columns: repeat(3, minmax(0, 1fr));\n  }',
          )

          sitemap = Path("sitemap.xml")
          text = sitemap.read_text(encoding="utf-8")
          text = text.replace('<url><loc>https://www.construccionsegura.org.pe/casos-de-obra.html</loc><lastmod>2026-07-13</lastmod>', '<url><loc>https://www.construccionsegura.org.pe/casos-de-obra.html</loc><lastmod>2026-07-21</lastmod>')
          text = text.replace('<url><loc>https://www.construccionsegura.org.pe/casos/seguimiento-vivienda-multifamiliar-seis-niveles.html</loc><lastmod>2026-07-13</lastmod>', '<url><loc>https://www.construccionsegura.org.pe/casos/seguimiento-vivienda-multifamiliar-seis-niveles.html</loc><lastmod>2026-07-21</lastmod>')
          old = '<url><loc>https://www.construccionsegura.org.pe/errores-frecuentes.html</loc><lastmod>2026-07-13</lastmod><changefreq>weekly</changefreq><priority>0.8</priority></url>'
          new = '<url><loc>https://www.construccionsegura.org.pe/errores-frecuentes.html</loc><lastmod>2026-07-21</lastmod><changefreq>weekly</changefreq><priority>0.8</priority></url>\n  <url><loc>https://www.construccionsegura.org.pe/errores/ladrillo-pandereta-muro-portante-asentado-de-canto.html</loc><lastmod>2026-07-21</lastmod><changefreq>monthly</changefreq><priority>0.9</priority></url>'
          if text.count(old) != 1:
              raise SystemExit("Missing sitemap marker")
          sitemap.write_text(text.replace(old, new, 1), encoding="utf-8")
          PY
          python /tmp/apply.py

      - name: Validate repository
        run: |
          python -m pip install --disable-pip-version-check Pillow==11.3.0 tinycss2==1.4.0
          python scripts/check_assets.py
          python scripts/check_resources.py
          python scripts/check_site.py
          while IFS= read -r -d '' file; do node --check "$file"; done < <(find . -type f -name '*.js' -not -path './.git/*' -print0)

      - name: Commit and remove temporary workflow
        run: |
          rm .github/workflows/apply-pandereta-content.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Incorporar observación sobre ladrillo pandereta"
          git push origin HEAD:content/ladrillo-pandereta-observacion-20260721
