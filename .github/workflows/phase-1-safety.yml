name: Phase 1 safety checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate-assets-and-privacy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install image validator
        run: python -m pip install --disable-pip-version-check Pillow==11.3.0

      - name: Produce asset validation report
        shell: bash
        run: |
          set +e
          python scripts/check_assets.py > phase-1-validation.txt 2>&1
          status=$?
          cat phase-1-validation.txt
          printf '%s\n' "$status" > phase-1-validation.status
          exit 0

      - name: Upload validation report
        uses: actions/upload-artifact@v4
        with:
          name: phase-1-validation-report
          path: |
            phase-1-validation.txt
            phase-1-validation.status
          if-no-files-found: error
          retention-days: 7

      - name: Enforce asset validation result
        shell: bash
        run: |
          test "$(cat phase-1-validation.status)" = "0"

      - name: Validate all JavaScript files
        shell: bash
        run: |
          while IFS= read -r -d '' file; do
            node --check "$file"
          done < <(find . -type f -name '*.js' -not -path './.git/*' -print0)

      - name: Validate site structure
        run: python scripts/check_site.py
