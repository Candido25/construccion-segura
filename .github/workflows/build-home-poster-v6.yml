name: Build homepage poster v6

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out working branch
        uses: actions/checkout@v4
        with:
          ref: portada-profesional-v6
          fetch-depth: 1
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Pillow
        run: python -m pip install --quiet pillow

      - name: Recover source image from current page data
        run: |
          node <<'NODE'
          const fs = require('fs');
          const js = fs.readFileSync('site-global.js', 'utf8');
          const marker = 'data:image/webp;base64,';
          const markerIndex = js.indexOf(marker);
          if (markerIndex < 0) throw new Error('No se encontró la imagen WebP embebida.');
          const start = markerIndex + marker.length;
          const end = js.indexOf('";', start);
          if (end < 0) throw new Error('No se encontró el cierre de la imagen WebP embebida.');
          const data = Buffer.from(js.slice(start, end), 'base64');
          fs.writeFileSync('assets/brand/portada-fuente-embebida-v6.webp', data);
          console.log(`Fuente recuperada: ${data.length} bytes`);
          NODE

      - name: Decode source with FFmpeg
        run: |
          ffmpeg -hide_banner -loglevel error -y -i assets/brand/portada-fuente-embebida-v6.webp -frames:v 1 assets/brand/portada-fuente-decodificada-v6.png
          file assets/brand/portada-fuente-decodificada-v6.png

      - name: Build responsive homepage images
        id: build_poster
        shell: bash
        run: |
          set +e
          python scripts/build_home_poster_v6.py > build-home-poster.log 2>&1
          status=$?
          printf '%s' "$status" > build-home-poster.status
          cat build-home-poster.log
          exit 0

      - name: Upload build diagnostic
        uses: actions/upload-artifact@v4
        with:
          name: build-home-poster-diagnostic
          path: |
            build-home-poster.log
            build-home-poster.status
          retention-days: 1

      - name: Stop if image build failed
        run: |
          test "$(cat build-home-poster.status)" = "0"

      - name: Validate generated images
        run: |
          file assets/brand/portada-construccion-segura-escritorio-v6.webp
          file assets/brand/portada-construccion-segura-movil-v6.webp

      - name: Validate local links and duplicate IDs
        run: python scripts/check_site.py

      - name: Validate JavaScript syntax
        run: |
          node --check script.js
          node --check privacy.js
          node --check site-global.js

      - name: Remove temporary files and diagnostics
        run: |
          rm -f scripts/build_home_poster_v6.py
          rm -f .github/workflows/build-home-poster-v6.yml
          rm -f assets/brand/portada-fuente-embebida-v6.webp
          rm -f assets/brand/portada-fuente-decodificada-v6.png
          rm -f build-home-poster.log build-home-poster.status

      - name: Commit completed homepage
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Implementar portada profesional con imágenes válidas [poster-v6]"
          git push origin HEAD:portada-profesional-v6
