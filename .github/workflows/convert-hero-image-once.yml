name: Convert hero image to HTML once

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  convert-hero-image:
    if: github.head_ref == 'saneamiento/fase-3b-imagen-html-20260719' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Check out controlled branch
        uses: actions/checkout@v4
        with:
          ref: saneamiento/fase-3b-imagen-html-20260719
          fetch-depth: 0
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install validators
        run: |
          python -m pip install --disable-pip-version-check \
            Pillow==11.3.0 \
            tinycss2==1.4.0

      - name: Convert the current image without redesigning the hero
        run: python scripts/convert_hero_image_once.py

      - name: Validate transformed repository
        shell: bash
        run: |
          python scripts/check_assets.py
          python scripts/check_resources.py
          python scripts/check_site.py
          while IFS= read -r -d '' file; do
            node --check "$file"
          done < <(find . -type f -name '*.js' -not -path './.git/*' -print0)
          git diff --check

      - name: Enforce exact write scope
        shell: bash
        run: |
          python <<'PY'
          import subprocess

          allowed = {"index.html", "hero.css", "service-worker.js"}
          output = subprocess.check_output(["git", "status", "--porcelain=v1"], text=True)
          changed = {line[3:].strip() for line in output.splitlines() if line.strip()}
          unexpected = sorted(changed - allowed)
          missing = sorted(allowed - changed)
          if unexpected:
              raise SystemExit(f"Archivos inesperados: {unexpected}")
          if missing:
              raise SystemExit(f"Archivos previstos sin modificar: {missing}")
          PY

      - name: Commit only the deterministic conversion
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html hero.css service-worker.js
          git commit -m "Convertir la imagen de portada a HTML real"
          git push origin HEAD:saneamiento/fase-3b-imagen-html-20260719
