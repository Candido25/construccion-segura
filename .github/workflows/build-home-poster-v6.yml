name: Build homepage poster v6

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out working branch
        uses: actions/checkout@v4
        with:
          ref: portada-profesional-v6
          fetch-depth: 1
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Pillow
        run: python -m pip install --quiet pillow

      - name: Recover valid source image from current page data
        run: |
          node <<'NODE'
          const fs = require('fs');
          const js = fs.readFileSync('site-global.js', 'utf8');
          const marker = 'data:image/webp;base64,';
          const markerIndex = js.indexOf(marker);
          if (markerIndex < 0) throw new Error('No se encontró la imagen WebP embebida.');
          const start = markerIndex + marker.length;
          const end = js.indexOf('";', start);
          if (end < 0) throw new Error('No se encontró el cierre de la imagen WebP embebida.');
          const data = Buffer.from(js.slice(start, end), 'base64');
          if (data.subarray(0, 4).toString('ascii') !== 'RIFF' || data.subarray(8, 12).toString('ascii') !== 'WEBP') {
            throw new Error('La imagen recuperada no contiene una cabecera WebP válida.');
          }
          fs.writeFileSync('assets/brand/portada-principal-construccion-segura.webp', data);
          console.log(`Fuente WebP recuperada: ${data.length} bytes`);
          NODE

      - name: Build responsive homepage images
        shell: bash
        run: |
          set -o pipefail
          python scripts/build_home_poster_v6.py 2>&1 | tee /tmp/build-home-poster.log

      - name: Validate generated images
        run: |
          file assets/brand/portada-construccion-segura-escritorio-v6.webp
          file assets/brand/portada-construccion-segura-movil-v6.webp

      - name: Validate local links and duplicate IDs
        run: python scripts/check_site.py

      - name: Validate JavaScript syntax
        run: |
          node --check script.js
          node --check privacy.js
          node --check site-global.js

      - name: Remove temporary builder
        run: |
          rm -f scripts/build_home_poster_v6.py
          rm -f .github/workflows/build-home-poster-v6.yml

      - name: Commit completed homepage
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Implementar portada profesional con imágenes válidas [poster-v6]"
          git push origin HEAD:portada-profesional-v6
