name: Run pandereta patch

on:
  push:
    branches:
      - content/ladrillo-pandereta-observacion-20260721

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: content/ladrillo-pandereta-observacion-20260721
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Extract and execute the reviewed patch
        run: |
          python <<'PY'
          from pathlib import Path
          import textwrap

          source = Path('.github/workflows/apply-pandereta-content.yml').read_text(encoding='utf-8')
          opening = "          cat > /tmp/apply.py <<'PY'\n"
          closing = "\n          PY\n          python /tmp/apply.py"
          if source.count(opening) != 1 or source.count(closing) != 1:
              raise SystemExit('No se pudo aislar el script de integración revisado.')
          block = source.split(opening, 1)[1].split(closing, 1)[0]
          Path('/tmp/apply.py').write_text(textwrap.dedent(block), encoding='utf-8')
          PY
          python /tmp/apply.py

      - name: Validate repository
        run: |
          python -m pip install --disable-pip-version-check Pillow==11.3.0 tinycss2==1.4.0
          python scripts/check_assets.py
          python scripts/check_resources.py
          python scripts/check_site.py
          while IFS= read -r -d '' file; do node --check "$file"; done < <(find . -type f -name '*.js' -not -path './.git/*' -print0)

      - name: Commit final content and remove temporary workflows
        run: |
          rm .github/workflows/apply-pandereta-content.yml
          rm .github/workflows/run-pandereta-patch.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Incorporar observación sobre ladrillo pandereta"
          git push origin HEAD:content/ladrillo-pandereta-observacion-20260721
