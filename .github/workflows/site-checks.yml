name: Site checks

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate-static-site:
    runs-on: ubuntu-latest
    steps:
      - name: Check out working branch
        uses: actions/checkout@v4
        with:
          ref: priorizar-identidad-ingeniero-civil
          fetch-depth: 0
          show-progress: false

      - name: Apply identity update and capture result
        run: |
          set +e
          python scripts/apply_identity_update.py > migration-output.txt 2>&1
          status=$?
          echo "$status" > migration-status.txt
          cat migration-output.txt
          exit 0

      - name: Upload migration diagnosis
        uses: actions/upload-artifact@v4
        with:
          name: identity-migration-diagnosis
          path: |
            migration-output.txt
            migration-status.txt
          retention-days: 1
