name: Assemble verified recubrimiento image

on:
  push:
    branches:
      - content/recubrimiento-viga-caseton-20260721

permissions:
  contents: write

jobs:
  assemble-image:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: content/recubrimiento-viga-caseton-20260721
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Pillow
        run: python -m pip install --disable-pip-version-check pillow

      - name: Assemble and validate WebP
        shell: bash
        run: |
          set -euo pipefail
          output='assets/site-photos/casos/multifamiliar-seis-niveles/recubrimiento-viga-caseton-20260721.webp'
          mkdir -p "$(dirname "$output")"
          cat .tmp/recubrimiento.part01 .tmp/recubrimiento.part02 .tmp/recubrimiento.part03 .tmp/recubrimiento.part04 | base64 --decode > "$output"
          python - <<'PY'
          from hashlib import sha256
          from pathlib import Path
          from PIL import Image

          path = Path('assets/site-photos/casos/multifamiliar-seis-niveles/recubrimiento-viga-caseton-20260721.webp')
          data = path.read_bytes()
          expected_sha = '043d3cba6403752f2231b2fb15dd164f8d3fbfb1399d52854ac804f5626635bc'
          actual_sha = sha256(data).hexdigest()
          assert data[:4] == b'RIFF' and data[8:12] == b'WEBP', 'El archivo no tiene firma WebP válida.'
          assert actual_sha == expected_sha, f'SHA-256 inesperado: {actual_sha}'

          with Image.open(path) as image:
              image.load()
              assert image.format == 'WEBP', image.format
              assert image.size == (800, 450), image.size
              assert not image.getexif(), 'La imagen conserva metadatos EXIF.'

          print(f'WebP validado: 800x450, SHA-256 {actual_sha}')
          PY

      - name: Remove temporary assembly files
        shell: bash
        run: |
          rm -rf .tmp
          rm -f .github/workflows/assemble-recubrimiento-image.yml

      - name: Commit verified image
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --check
          git commit -m 'Añadir fotografía verificada de recubrimiento de viga'
          git push origin HEAD:content/recubrimiento-viga-caseton-20260721
