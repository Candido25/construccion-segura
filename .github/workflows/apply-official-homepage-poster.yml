name: Apply official homepage poster

on:
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  build-validate-and-merge:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out clean working branch
        uses: actions/checkout@v4
        with:
          ref: agent/nueva-portada-afiche-v2
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install image tools
        run: python -m pip install --quiet pillow

      - name: Recover source and build valid WebP files
        run: |
          git fetch origin portada-profesional-v6:refs/remotes/origin/portada-profesional-v6
          git show origin/portada-profesional-v6:site-global.js > /tmp/historical-site-global.js
          python <<'PY'
          from pathlib import Path
          from PIL import Image
          import base64
          import io
          import re

          text = Path('/tmp/historical-site-global.js').read_text(encoding='utf-8')
          match = re.search(r'data:image/webp;base64,([A-Za-z0-9+/=]+)', text)
          if not match:
              raise SystemExit('No se encontró la fuente gráfica embebida en la rama histórica.')

          raw = bytearray(base64.b64decode(match.group(1)))
          if len(raw) < 100_000:
              raise SystemExit(f'La fuente recuperada es demasiado pequeña: {len(raw)} bytes.')
          if raw[:4] != b'RIFF':
              raise SystemExit(f'Contenedor inesperado: {bytes(raw[:4])!r}')
          if raw[8:12] == b'UGIP':
              raw[8:12] = b'WEBP'
          if raw[8:12] != b'WEBP':
              raise SystemExit(f'Firma WebP inesperada: {bytes(raw[8:12])!r}')

          source = Image.open(io.BytesIO(raw)).convert('RGB')
          source.load()
          if source.width < 900 or source.height < 900:
              raise SystemExit(f'Resolución insuficiente: {source.size}')
          ratio = source.width / source.height
          if not 0.80 <= ratio <= 1.25:
              raise SystemExit(f'La fuente recuperada no tiene proporción de afiche: {source.size}')

          def fit_canvas(image, size):
              width, height = size
              scale = min(width / image.width, height / image.height)
              resized = image.resize(
                  (round(image.width * scale), round(image.height * scale)),
                  Image.Resampling.LANCZOS,
              )
              canvas = Image.new('RGB', size, (255, 255, 255))
              canvas.paste(resized, ((width - resized.width) // 2, (height - resized.height) // 2))
              return canvas

          out = Path('assets/site-photos/web')
          out.mkdir(parents=True, exist_ok=True)
          fit_canvas(source, (1200, 1200)).save(
              out / 'hero-portada-desktop.webp', 'WEBP', quality=88, method=6
          )
          fit_canvas(source, (900, 900)).save(
              out / 'hero-portada-mobile.webp', 'WEBP', quality=86, method=6
          )
          print('Fuente recuperada:', source.size, len(raw), 'bytes')
          PY

      - name: Apply homepage markup and cache changes
        run: |
          python <<'PY'
          from pathlib import Path

          index = Path('index.html')
          html = index.read_text(encoding='utf-8')
          html = html.replace('20260718-1', '20260719-7')
          html = html.replace(
              'hero-media hero-media-brand watermark-frame',
              'hero-media hero-media-brand',
          )
          overlay = '''        <div class="hero-grid" aria-hidden="true"></div>
                  <div class="hero-badge hero-badge-top">Consulta remota nacional</div>
                  <div class="hero-badge hero-badge-bottom">Visitas técnicas en Lima</div>
                  <div class="hero-panel">
                    <span>Responsable técnico</span>
                    <strong>Ing. Omar Oswaldo Alcantara Aquino</strong>
                    <p>Ingeniero<br>CIP N.° 364395</p>
                  </div>
          '''
          if overlay not in html:
              raise SystemExit('No se encontró el bloque superpuesto esperado en index.html.')
          html = html.replace(overlay, '')
          html = html.replace('width="1920" height="1080"', 'width="1200" height="1200"')
          old_alt = 'Vivienda, planos, herramientas y casco de Construcción Segura como representación de una obra planificada y protegida'
          new_alt = 'Afiche de Construcción Segura con servicios de asesoría técnica, vivienda, planos, casco y canales de atención'
          if old_alt not in html:
              raise SystemExit('No se encontró el texto alternativo anterior.')
          html = html.replace(old_alt, new_alt)
          index.write_text(html, encoding='utf-8')

          css_path = Path('hero-responsive.css')
          css = css_path.read_text(encoding='utf-8')
          if 'object-fit: cover;' not in css:
              raise SystemExit('No se encontró object-fit: cover en hero-responsive.css.')
          css = css.replace('object-fit: cover;', 'object-fit: contain;')
          css = css.replace('#eef2f4', '#ffffff')
          css_path.write_text(css, encoding='utf-8')

          sw_path = Path('service-worker.js')
          sw = sw_path.read_text(encoding='utf-8')
          if 'mi-casa-segura-pwa-v9' not in sw:
              raise SystemExit('No se encontró la versión de caché v9.')
          sw = sw.replace('mi-casa-segura-pwa-v9', 'mi-casa-segura-pwa-v10')
          sw = sw.replace('20260718-1', '20260719-7')
          sw_path.write_text(sw, encoding='utf-8')
          PY

      - name: Validate images and website
        run: |
          python <<'PY'
          from pathlib import Path
          from PIL import Image

          expected = {
              'assets/site-photos/web/hero-portada-desktop.webp': (1200, 1200),
              'assets/site-photos/web/hero-portada-mobile.webp': (900, 900),
          }
          for name, size in expected.items():
              path = Path(name)
              image = Image.open(path)
              image.verify()
              image = Image.open(path)
              if image.format != 'WEBP':
                  raise SystemExit(f'{name}: formato {image.format}')
              if image.size != size:
                  raise SystemExit(f'{name}: dimensiones {image.size}')
              if path.stat().st_size > 350_000:
                  raise SystemExit(f'{name}: archivo demasiado pesado ({path.stat().st_size} bytes)')
              print(name, image.size, path.stat().st_size)
          PY
          python scripts/check_site.py
          node --check script.js
          node --check privacy.js
          node --check site-global.js
          git diff --check

      - name: Remove one-time workflow
        run: rm -f .github/workflows/apply-official-homepage-poster.yml

      - name: Commit validated homepage
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Actualizar portada con el nuevo afiche oficial'
          git push origin HEAD:agent/nueva-portada-afiche-v2

      - name: Merge validated pull request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr ready "${{ github.event.pull_request.number }}"
          gh pr merge "${{ github.event.pull_request.number }}" --squash --delete-branch=false
