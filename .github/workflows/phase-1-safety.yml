name: Repository safety checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate-repository:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install validators
        run: |
          python -m pip install --disable-pip-version-check \
            Pillow==11.3.0 \
            tinycss2==1.4.0

      - name: Produce validation report
        shell: bash
        run: |
          set +e
          {
            echo "== Imágenes, privacidad y rutas prohibidas =="
            python scripts/check_assets.py
            assets_status=$?

            echo
            echo "== Integridad de HTML, CSS, JavaScript, manifest y service worker =="
            python scripts/check_resources.py
            resources_status=$?

            echo
            echo "== Estructura HTML, enlaces e identidad =="
            python scripts/check_site.py
            site_status=$?

            echo
            echo "== Sintaxis de todos los JavaScript =="
            javascript_status=0
            while IFS= read -r -d '' file; do
              node --check "$file" || javascript_status=1
            done < <(find . -type f -name '*.js' -not -path './.git/*' -print0)

            if [ "$assets_status" -eq 0 ] \
              && [ "$resources_status" -eq 0 ] \
              && [ "$site_status" -eq 0 ] \
              && [ "$javascript_status" -eq 0 ]; then
              final_status=0
            else
              final_status=1
            fi

            echo
            echo "Resultado final: $final_status"
          } > repository-validation.txt 2>&1

          cat repository-validation.txt
          printf '%s\n' "$final_status" > repository-validation.status
          exit 0

      - name: Upload validation report
        uses: actions/upload-artifact@v4
        with:
          name: repository-validation-report
          path: |
            repository-validation.txt
            repository-validation.status
          if-no-files-found: error
          retention-days: 7

      - name: Enforce validation result
        shell: bash
        run: test "$(cat repository-validation.status)" = "0"
