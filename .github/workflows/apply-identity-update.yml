name: Apply identity update

on:
  push:
    branches: [priorizar-identidad-ingeniero-civil]

permissions:
  contents: write

jobs:
  apply:
    if: ${{ !contains(github.event.head_commit.message, '[identity-applied]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out working branch
        uses: actions/checkout@v4
        with:
          ref: priorizar-identidad-ingeniero-civil
          fetch-depth: 0
          show-progress: false

      - name: Apply identity migration
        run: python scripts/apply_identity_update.py

      - name: Remove one-time migration files
        run: |
          rm scripts/apply_identity_update.py
          rm .github/workflows/apply-identity-update.yml

      - name: Commit updated public identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Retirar menciones públicas de la formación técnica [identity-applied]"
          git push origin HEAD:priorizar-identidad-ingeniero-civil
