name: Site checks

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate-static-site:
    runs-on: ubuntu-latest
    steps:
      - name: Check out working branch
        uses: actions/checkout@v4
        with:
          ref: identidad-publica-ingeniero
          fetch-depth: 0
          show-progress: false

      - name: Apply public label migration
        run: python scripts/apply_engineer_public_label.py

      - name: Validate local links and duplicate IDs
        run: python scripts/check_site.py

      - name: Validate JavaScript syntax
        run: |
          node --check script.js
          node --check privacy.js
          node --check site-global.js

      - name: Package transformed files
        run: |
          git diff --name-only -- '*.html' AGENTS.md scripts/check_site.py > transformed-file-list.txt
          tar -czf transformed-public-label.tar.gz -T transformed-file-list.txt

      - name: Upload transformed files
        uses: actions/upload-artifact@v4
        with:
          name: transformed-public-label
          path: |
            transformed-public-label.tar.gz
            transformed-file-list.txt
          retention-days: 1
