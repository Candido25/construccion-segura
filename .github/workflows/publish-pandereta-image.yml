name: Publish verified pandereta image

on:
  push:
    branches:
      - content/ladrillo-pandereta-observacion-20260721

permissions:
  contents: write

jobs:
  publish-image:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Pillow
        run: python -m pip install --disable-pip-version-check Pillow==11.3.0

      - name: Recover and validate the approved image blob
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python <<'PY'
          from pathlib import Path
          from PIL import Image
          import base64, hashlib, json, os, urllib.request

          blob_sha = "741ea74cce3cdaf9de69ae921e5df772ff6fbdc0"
          expected_sha256 = "10125e85478ad380f9d73ef4270e93038c45a719a8144460574b3174716881d4"
          request = urllib.request.Request(
              f"https://api.github.com/repos/Candido25/construccion-segura/git/blobs/{blob_sha}",
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {os.environ['GITHUB_TOKEN']}",
                  "X-GitHub-Api-Version": "2022-11-28",
                  "User-Agent": "construccion-segura-content-publisher",
              },
          )
          with urllib.request.urlopen(request) as response:
              payload = json.load(response)
          data = base64.b64decode(payload["content"])
          assert hashlib.sha256(data).hexdigest() == expected_sha256
          target = Path("assets/site-photos/casos/multifamiliar-seis-niveles/ladrillo-pandereta-de-canto.webp")
          target.parent.mkdir(parents=True, exist_ok=True)
          target.write_bytes(data)
          with Image.open(target) as image:
              image.load()
              assert image.format == "WEBP"
              assert image.size == (960, 540)
              assert not image.getexif()
          print("Imagen validada: WebP 960 x 540, sin EXIF.")
          PY

      - name: Commit image and remove temporary workflow
        run: |
          rm .github/workflows/publish-pandereta-image.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Añadir fotografía optimizada de ladrillo pandereta"
          git push origin HEAD
